# Update del SO + reinicio una sola vez al dia, a las 04:00 hora local.
# "bootc update --apply" NO hace nada (ni reinicia) si no hay imagen nueva.
# Se vacian primero los disparadores de fabrica para que el UNICO sea las 04:00.
[Timer]
OnBootSec=
OnUnitInactiveSec=
OnUnitActiveSec=
RandomizedDelaySec=
OnCalendar=*-*-* 04:00:00
Persistent=true
